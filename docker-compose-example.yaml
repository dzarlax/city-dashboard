version: '3.8'

services:
  backend:
    image: dzarlax/city_dashboard:latest
    container_name: city_dashboard
    restart: always
    ports:
      - "3001:3001"
    environment:
      WEATHER_API_KEY: your_openweathermap_api_key
      BELGRADE_LAT: 44.81644823759748
      BELGRADE_LON: 20.460119250509425
      SEARCH_RAD: 400
      BG_API_NAME: "Beograd"
      BG_API_URL: "https://announcement-bgnaplata.ticketing.rs"
      BG_API_KEY: your_bg_api_key
      BG_API_V2_KEY: your_bg_api_v2_key
      BG_API_V2_IV: your_bg_api_v2_iv
      NS_API_NAME: "Novi Sad"
      NS_API_URL: "https://online.nsmart.rs"
      NS_API_KEY: your_ns_api_key
      NIS_API_NAME: "Niš"
      NIS_API_URL: "https://online.jgpnis.rs"
      NIS_API_KEY: your_nis_api_key
    command: /app/server
