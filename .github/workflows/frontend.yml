name: Build and Deploy Frontend to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - 'src/client/**'
      - 'public/**'
      - 'index.html'
      - 'package.json'
      - 'package-lock.json'
      - 'vite.config*.js'
      - 'tailwind.config.js'
      - 'postcss.config.js'
      - 'Dockerfile.front'
      - '.github/workflows/frontend.yml'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # Шаг 1: Checkout репозиторий
      - name: Checkout repository
        uses: actions/checkout@v4

      # Шаг 2: Сборка фронтенда в Docker
      - name: Build static files in Docker
        run: |
          docker build -t frontend-builder -f Dockerfile.front --build-arg GITHUB_PAGES=true .
          docker create --name build-container frontend-builder
          docker cp build-container:/app/dist ./dist
          docker rm build-container

      # Шаг 3: Inject GA measurement ID (if configured)
      - name: Inject Google Analytics
        if: vars.GA_MEASUREMENT_ID != ''
        run: sed -i "s/__GA_MEASUREMENT_ID__/${{ vars.GA_MEASUREMENT_ID }}/g" ./dist/index.html

      # Шаг 4: Добавление CNAME файла
      - name: Add CNAME file
        run: echo "transport.dzarlax.dev" > ./dist/CNAME

      # Шаг 5: Деплой на GitHub Pages
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages